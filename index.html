<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Element Clash - ICAN Institute</title>
    <style>
        :root {
            --bg-dark: #051224;
            --card-bg: #0d2137;
            --accent-cyan: #00f3ff;
            --accent-red: #ff2a6d;
            --text-gold: #ffd700;
            --text-light: #e0e6ed;
            --text-dim: #8fa3b3;
        }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: white;
            margin: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-image: radial-gradient(circle at 50% 50%, rgba(0, 243, 255, 0.03) 0%, transparent 60%),
                url('data:image/svg+xml;utf8,<svg width="40" height="40" xmlns="http://www.w3.org/2000/svg"><path d="M20 0L40 10V30L20 40L0 30V10L20 0Z" fill="none" stroke="%2300f3ff" stroke-width="0.5" opacity="0.1"/></svg>');
        }
        h1 {
            font-family: 'Impact', 'Arial Black', sans-serif;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 2.8rem;
            margin: 20px 0 5px 0;
            background: linear-gradient(to bottom, #fff, var(--accent-cyan));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 243, 255, 0.5);
        }
        .subtitle {
            color: var(--accent-red);
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }
        .game-area {
            width: 100%;
            max-width: 1000px;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 20px;
        }
        .battlefield {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            width: 100%;
            position: relative;
            margin-bottom: 20px;
            min-height: 480px;
        }
        .player-side {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 300px;
        }
        .player-label {
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 10px;
            color: var(--text-light);
        }
        .player-label span { color: var(--accent-cyan); }
        .cpu-label span { color: var(--accent-red); }
        .card-container {
            width: 280px;
            height: 420px;
            perspective: 1000px;
        }
        .card {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #112d4a 0%, #091a2e 100%);
            border-radius: 12px;
            border: 2px solid var(--accent-cyan);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: transform 0.3s, border-color 0.3s;
        }
        .card.hidden-card {
            border-color: #333;
            filter: grayscale(100%);
            justify-content: center;
            align-items: center;
            background: repeating-linear-gradient(45deg, #0d2137, #0d2137 10px, #112d4a 10px, #112d4a 20px);
        }
        .card.hidden-card::after {
            content: "?";
            font-size: 8rem;
            color: rgba(255, 255, 255, 0.1);
            font-weight: bold;
        }
        .card-header {
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid rgba(0, 243, 255, 0.2);
            background: rgba(0, 0, 0, 0.2);
        }
        .element-id-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: var(--accent-red);
            color: white;
            font-size: 0.8rem;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }
        .symbol {
            font-size: 3.5rem;
            font-weight: bold;
            color: var(--text-gold);
            line-height: 1;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.4);
        }
        .name {
            font-size: 1rem;
            color: var(--text-light);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 5px;
        }
        .stats-box {
            padding: 15px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            gap: 6px;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 0.85rem;
            cursor: default;
            border: 1px solid transparent;
            transition: all 0.2s;
        }
        .player-card .stat-row { cursor: pointer; }
        .player-card .stat-row:hover {
            background: rgba(0, 243, 255, 0.15);
            border-color: var(--accent-cyan);
            transform: translateX(5px);
        }
        .stat-label { color: var(--text-dim); }
        .stat-value { font-weight: bold; color: var(--text-light); }
        .mid-hud {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            pointer-events: none;
        }
        .vs-text {
            font-size: 2.5rem;
            font-weight: bold;
            color: var(--accent-red);
            text-shadow: 0 0 10px rgba(255, 42, 109, 0.8);
        }
        .controls { margin: 20px 0; display: flex; gap: 15px; }
        button {
            background: linear-gradient(45deg, #0066ff, #00aaff);
            border: none;
            padding: 12px 25px;
            font-size: 1rem;
            color: white;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0, 102, 255, 0.4);
            transition: transform 0.2s;
        }
        button:hover { transform: scale(1.05); }
        button:disabled { background: #444; cursor: not-allowed; transform: none; box-shadow: none; }
        #message-panel {
            width: 90%;
            max-width: 800px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid #333;
            border-radius: 10px;
            padding: 15px;
            min-height: 60px;
            text-align: center;
            color: #fff;
            font-size: 1.1rem;
            line-height: 1.4;
            margin-bottom: 20px;
        }
        .highlight-win { color: #4caf50; font-weight: bold; }
        .highlight-loss { color: var(--accent-red); font-weight: bold; }
        .highlight-special { color: var(--text-gold); font-weight: bold; text-transform: uppercase; }
        @media (max-width: 768px) {
            .battlefield { flex-direction: column; gap: 40px; }
            .mid-hud { position: relative; transform: none; margin: -20px 0; }
            .vs-text { background: rgba(0,0,0,0.8); padding: 5px 15px; border-radius: 20px; }
        }
    </style>
</head>

    <h1>Element Clash</h1>

        <div class="battlefield">

                </div>
            </div>
            <div class="mid-hud">
                <div class="vs-text">VS</div>
            </div>
            <div class="player-side">

                <div class="card-container">
                    <div id="cpu-card" class="card hidden-card"></div>
                </div>
            </div>
        </div>
        <div class="controls">
            <button id="btn-start" onclick="initGame()">Start Game</button>
            <button id="btn-next" onclick="nextRound()" disabled>Next Round</button>
        </div>
    </div>

    {s:"Og", n:"Oganesson", an:118, t:"Noble Gas", p:7, g:18, v:0, mm:294, mp:null, bp:null, id:1870}
];

const dominanceIDs = [111, 222, 333, 444, 555, 666, 777];

let playerDeck = [];
let cpuDeck = [];
let currentPlayerCard = null;
let currentCpuCard = null;
let gameActive = false;

const msgPanel = document.getElementById('message-panel');
const btnNext = document.getElementById('btn-next');
const btnStart = document.getElementById('btn-start');

function initGame() {
    let deck = [...elementsDB].sort(() => Math.random() - 0.5);
    playerDeck = deck.slice(0, 59);
    cpuDeck = deck.slice(59);
    gameActive = true;
    btnStart.style.display = 'none';
    btnNext.disabled = false;
    updateCounts();
    log("Game Started! You have 59 cards. Select a stat on your card to battle.");
    nextRound();
}

function nextRound() {
    if (!gameActive) return;
    if (playerDeck.length === 0) { endGame("Computer Wins! You ran out of cards."); return; }
    if (cpuDeck.length === 0) { endGame("You Win! Computer ran out of cards."); return; }
    currentPlayerCard = playerDeck.shift();
    currentCpuCard = cpuDeck.shift();
    renderCard('player-card', currentPlayerCard, true);
    renderCard('cpu-card', currentCpuCard, false);
    btnNext.disabled = true;
    log("Cards drawn. Choose your attribute!");
}

function renderCard(elementId, card, isInteractive) {
    const el = document.getElementById(elementId);
    el.className = isInteractive ? 'card player-card' : 'card cpu-card hidden-card';
    if (!isInteractive) { el.innerHTML = `<div class="element-id-badge">ID: ???</div>`; return; }
    const stats = [
        { key: 'an', label: 'Atomic Number', val: card.an, type: 'power' },
        { key: 'mp', label: 'Melting Point', val: card.mp, type: 'power' },
        { key: 'bp', label: 'Boiling Point', val: card.bp, type: 'power' },
        { key: 'mm', label: 'Molar Mass', val: card.mm, type: 'power' },
        { key: 'v', label: 'Valency', val: card.v, type: 'weak' },
        { key: 'p', label: 'Period', val: card.p, type: 'weak' },
        { key: 'g', label: 'Group', val: card.g, type: 'weak' }
    ];
    let statsHTML = stats.map(s => {
        let u = s.key==='mm' ? ' g/mol' : (s.key==='mp'||s.key==='bp') ? ' °C' : '';
        let v = (s.val === null || s.val === undefined) ? 'Unknown' : s.val;
        return `<div class="stat-row" onclick="selectStat('${s.key}','${s.type}')" data-key="${s.key}">
            <span class="stat-label">${s.label}</span>
            <span class="stat-value">${v}${u}</span>
        </div>`;
    }).join('');
    el.innerHTML = `
        <div class="element-id-badge">ID: ${card.id}</div>
        <div class="card-header">
            <div class="symbol">${card.s}</div>
            <div class="name">${card.n}</div>
        </div>
        <div class="stats-box">${statsHTML}</div>`;
}

function selectStat(key, type) {
    if (!currentPlayerCard || !currentCpuCard) return;
    const cpuCardEl = document.getElementById('cpu-card');
    cpuCardEl.className = 'card cpu-card';
    const stats = [
        { key: 'an', label: 'Atomic Number', val: currentCpuCard.an },
        { key: 'mp', label: 'Melting Point', val: currentCpuCard.mp },
        { key: 'bp', label: 'Boiling Point', val: currentCpuCard.bp },
        { key: 'mm', label: 'Molar Mass', val: currentCpuCard.mm },
        { key: 'v', label: 'Valency', val: currentCpuCard.v },
        { key: 'p', label: 'Period', val: currentCpuCard.p },
        { key: 'g', label: 'Group', val: currentCpuCard.g }
    ];
    let statsHTML = stats.map(s => {
        let u = s.key==='mm' ? ' g/mol' : (s.key==='mp'||s.key==='bp') ? ' °C' : '';
        let v = (s.val === null) ? 'Unknown' : s.val;
        return `<div class="stat-row"><span class="stat-label">${s.label}</span><span class="stat-value">${v}${u}</span></div>`;
    }).join('');
    cpuCardEl.innerHTML = `
        <div class="element-id-badge">ID: ${currentCpuCard.id}</div>
        <div class="card-header">
            <div class="symbol">${currentCpuCard.s}</div>
            <div class="name">${currentCpuCard.n}</div>
        </div>
        <div class="stats-box">${statsHTML}</div>`;

    const pDomRank = dominanceIDs.indexOf(currentPlayerCard.id);
    const cDomRank = dominanceIDs.indexOf(currentCpuCard.id);

    if (pDomRank !== -1 && cDomRank === -1) {
        log(`<span class="highlight-special">ID DOMINANCE!</span> Your ID ${currentPlayerCard.id} defeats the opponent!`);
        playerWins(); return;
    } else if (cDomRank !== -1 && pDomRank === -1) {
        log(`<span class="highlight-special">ID DOMINANCE!</span> Enemy ID ${currentCpuCard.id} defeats you!`);
        cpuWins(); return;
    } else if (pDomRank !== -1 && cDomRank !== -1) {
        if (pDomRank < cDomRank) { log(`<span class="highlight-special">TITAN CLASH!</span> Your Dominance ID is stronger!`); playerWins(); }
        else if (cDomRank < pDomRank) { log(`<span class="highlight-special">TITAN CLASH!</span> Enemy Dominance ID is stronger!`); cpuWins(); }
        else { log(`<span class="highlight-special">TIE!</span> Equal Dominance IDs. Self-Destruct!`); updateCounts(); btnNext.disabled = false; }
        return;
    }

    let pVal = currentPlayerCard[key];
    let cVal = currentCpuCard[key];

    if (pVal === null && cVal === null) { log("Both values Unknown. Tie!"); tie(); return; }
    if (pVal === null) { log("Your value Unknown. You lose."); cpuWins(); return; }
    if (cVal === null) { log("Enemy value Unknown. You win!"); playerWins(); return; }

    if (pVal === cVal) {
        if (currentPlayerCard.id > currentCpuCard.id) {
            log(`Tie on value! Higher ID wins! (You: ${currentPlayerCard.id} vs CPU: ${currentCpuCard.id})`);
            playerWins();
        } else if (currentCpuCard.id > currentPlayerCard.id) {
            log(`Tie on value! Higher ID wins! (CPU: ${currentCpuCard.id} vs You: ${currentPlayerCard.id})`);
            cpuWins();
        } else {
            log("Perfect Tie! Self-Destruct! Cards removed.");
            btnNext.disabled = false;
        }
        return;
    }

    let playerWinsRound = (type === 'power') ? (pVal > cVal) : (pVal < cVal);
    let logicText = type === 'power' ? `(High Wins: ${pVal} vs ${cVal})` : `(Low Wins: ${pVal} vs ${cVal})`;

    if (playerWinsRound) { log(`<span class="highlight-win">You WIN!</span> ${logicText}`); playerWins(); }
    else { log(`<span class="highlight-loss">You LOSE!</span> ${logicText}`); cpuWins(); }
}

function playerWins() { playerDeck.push(currentPlayerCard, currentCpuCard); updateCounts(); btnNext.disabled = false; }
function cpuWins() { cpuDeck.push(currentPlayerCard, currentCpuCard); updateCounts(); btnNext.disabled = false; }
function tie() { updateCounts(); btnNext.disabled = false; }

function updateCounts() {
    document.getElementById('p-deck-count').innerText = `(Cards: ${playerDeck.length})`;
    document.getElementById('c-deck-count').innerText = `(Cards: ${cpuDeck.length})`;
}

function log(msg) { msgPanel.innerHTML = msg; }

function endGame(msg) {
    log(`<span class="highlight-win">${msg}</span> Click Start to play again.`);
    gameActive = false;
    btnStart.style.display = 'block';
    btnStart.innerText = "Restart Game";
    btnNext.disabled = true;
}
</script>
